function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let ledeQueue=ledeStories.length?shuffle(ledeStories.map((_,i)=>i)):[];let ledePos=0;
function nextLede(){if(!ledeQueue.length)return;if(ledePos>=ledeQueue.length){ledeQueue=shuffle(ledeStories.map((_,i)=>i));ledePos=0;}const story=ledeStories[ledeQueue[ledePos++]];const textEl=document.getElementById('ledeText');const sourceEl=document.getElementById('ledeSource');textEl.classList.add('fading');sourceEl.classList.add('fading');setTimeout(()=>{textEl.textContent='“'+story.lede+'”';sourceEl.textContent=story.headline+'  ·  '+story.publication+'  ·  '+story.date;document.getElementById('ledeReadBtn').href=story.url;textEl.classList.remove('fading');sourceEl.classList.remove('fading');},240);}
document.getElementById('ledeAgainBtn').addEventListener('click',nextLede);
if(ledeQueue.length)nextLede();
let activeTopicId=null;
function renderTopics(){const grid=document.getElementById('topicGrid');topics.forEach(topic=>{const btn=document.createElement('button');btn.className='topic-btn';btn.innerHTML='<span>'+topic.label+'</span>';btn.addEventListener('click',()=>{const isActive=btn.classList.contains('active');document.querySelectorAll('.topic-btn,.expand-tag').forEach(b=>b.classList.remove('active'));activeTopicId=null;if(isActive){document.getElementById('storiesSection').classList.remove('visible');}else{btn.classList.add('active');activeTopicId=topic.id;selectTopic(topic.id,topic.label);}});grid.appendChild(btn);});if(expandedTopics.length){const browseBtn=document.createElement('button');browseBtn.className='topic-btn browse-btn';browseBtn.innerHTML='<span>Browse all topics ▾</span>';browseBtn.addEventListener('click',()=>{const panel=document.getElementById('expandPanel');const open=panel.classList.toggle('open');browseBtn.querySelector('span').textContent=open?'Hide topics ▴':'Browse all topics ▾';if(open&&!panel.innerHTML){const groups={};expandedTopics.forEach(t=>{const g=t.group||'topics';if(!groups[g])groups[g]=[];groups[g].push(t);});const groupLabels={people:'People & Cases',topics:'Topics',format:'Format',featured:'Featured'};Object.keys(groups).forEach(g=>{const lbl=document.createElement('div');lbl.className='expand-group-label';lbl.textContent=groupLabels[g]||g;panel.appendChild(lbl);const row=document.createElement('div');row.className='expand-tags';groups[g].forEach(t=>{const tag=document.createElement('button');tag.className='expand-tag';tag.textContent=t.label;tag.addEventListener('click',()=>{document.querySelectorAll('.topic-btn,.expand-tag').forEach(b=>b.classList.remove('active'));tag.classList.add('active');activeTopicId=t.id;selectTopic(t.id,t.label);});row.appendChild(tag);});panel.appendChild(row);});}});grid.appendChild(browseBtn);}}
function selectTopic(id,label){const filtered=stories.filter(s=>s.topics.includes(id));const section=document.getElementById('storiesSection');section.classList.add('visible');document.getElementById('storiesTopicLabel').textContent=label;document.getElementById('storiesCount').textContent=filtered.length+' stor'+(filtered.length===1?'y':'ies');const grid=document.getElementById('storyGrid');grid.innerHTML='';filtered.forEach(story=>{const a=document.createElement('a');a.href=story.url;a.className='story-card';a.innerHTML='<div class="story-meta">'+story.publication+' · '+story.date+'</div>'+'<div class="story-headline">'+story.headline+'</div>'+'<div class="story-brief">'+story.brief+'</div>'+'<span class="story-arrow">↗</span>';grid.appendChild(a);void a.offsetWidth;});section.scrollIntoView({behavior:'smooth',block:'start'});}
renderTopics();
</script>
</body>
</html>
